<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">Flipkart</div>

    <div class="search-bar">
      <input type="text" placeholder="Search for products, brands and more">
      <button class="search-btn">🔍</button>
    </div>

    <div class="nav-buttons">
      <button class="login-btn">Login</button>
      <button class="cart-btn">
        🛒 Cart <span id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <!-- Banner Section -->
  <section class="banner">
    <img src="https://via.placeholder.com/1200x300?text=Big+Billion+Days+Sale" alt="Banner">
  </section>

  <!-- Product Grid -->
  <section class="product-grid">

    <div class="product-card">
      <img src="https://via.placeholder.com/200x200?text=Product+1" alt="Product 1">
      <h3>Wireless Headphones</h3>
      <p class="price">₹1,499</p>
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/200x200?text=Product+2" alt="Product 2">
      <h3>Smart Watch</h3>
      <p class="price">₹2,999</p>
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/200x200?text=Product+3" alt="Product 3">
      <h3>Running Shoes</h3>
      <p class="price">₹1,199</p>
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/200x200?text=Product+4" alt="Product 4">
      <h3>Bluetooth Speaker</h3>
      <p class="price">₹899</p>
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
